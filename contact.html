<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ShrubBrewWorld</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="logo">
            <a href="h1.html">
                <img src="./image/logo.png" alt="ShrubBrewWorld Logo" class="main-logo">
            </a>
        </div>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav id="nav-menu">
            <ul>
                <li><a href="h1.html">Home</a></li>
                <li><a href="h1.html#menu-section">Our Product</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <section class="page-hero">
        <div class="content">
            <h1>CONTACT US</h1>
            <p>We'd love to hear from you. Visit us or reach out online.</p>
        </div>
    </section>

    <section class="contact-section">
        <div class="contact-container">
            <div class="contact-info">
                <h3>Our Location</h3>
                <p>123 Brew Street, Coffee Valley, CA 90210</p>
                <h3>Hours</h3>
                <p>Mon - Fri: 7am - 8pm<br>Sat - Sun: 8am - 9pm</p>
                <h3>Phone</h3>
                <p>+1 (555) BREW-NOW</p>
            </div>
            <form class="contact-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>



    <script src="script.js"></script>
</body>

</html>
